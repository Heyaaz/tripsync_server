name: GitHub Intake To Discord

on:
  workflow_dispatch:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    env:
      BOT_MENTION: ${{ vars.NOGADA_DISCORD_MENTION }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Validate Discord configuration
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set."
            exit 1
          fi

      - name: Build Discord payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mention = process.env.BOT_MENTION || '<@1465726091808473183>';
            const mentionPrefix = mention ? `${mention} ` : '';
            const eventName = context.eventName;
            const payload = context.payload;
            let lines;

            if (eventName === 'pull_request') {
              lines = [
                `${mentionPrefix}github_event=pr`,
                `repo=${context.repo.owner}/${context.repo.repo}`,
                `number=${payload.pull_request.number}`,
                `title=${payload.pull_request.title}`,
                `author=${context.actor}`,
                `url=${payload.pull_request.html_url}`,
                `base=${payload.pull_request.base.ref}`,
                `base_sha=${payload.pull_request.base.sha}`,
                `head=${payload.pull_request.head.ref}`,
                `head_sha=${payload.pull_request.head.sha}`,
                `draft=${payload.pull_request.draft}`,
                `changed_files=${payload.pull_request.changed_files}`,
                `additions=${payload.pull_request.additions}`,
                `deletions=${payload.pull_request.deletions}`,
                `diff_url=${payload.pull_request.diff_url}`,
                `patch_url=${payload.pull_request.patch_url}`,
                'action=review',
              ];
            } else if (eventName === 'issues') {
              lines = [
                `${mentionPrefix}github_event=issue`,
                `repo=${context.repo.owner}/${context.repo.repo}`,
                `number=${payload.issue.number}`,
                `title=${payload.issue.title}`,
                `author=${context.actor}`,
                `url=${payload.issue.html_url}`,
                'action=triage',
              ];
            } else {
              const comment = (payload.comment?.body || '').replace(/\r?\n/g, ' ');
              lines = [
                `${mentionPrefix}github_event=issue_comment`,
                `repo=${context.repo.owner}/${context.repo.repo}`,
                `number=${payload.issue.number}`,
                `author=${context.actor}`,
                `url=${payload.comment.html_url}`,
                `comment=${comment}`,
                'action=route',
              ];
            }

            fs.writeFileSync(
              'payload.json',
              JSON.stringify({
                content: lines.join('\n'),
                allowed_mentions: { parse: ['users'] },
              }),
            );

      - name: Post to Discord
        run: |
          curl -fsSL -X POST \
            -H 'Content-type: application/json' \
            --data @payload.json \
            "$DISCORD_WEBHOOK_URL"
