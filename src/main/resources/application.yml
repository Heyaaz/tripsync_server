spring:
  application:
    name: tmti-server

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/tripsync
    username: ${DB_USER:tripsync}
    password: ${DB_PASSWORD:tripsync}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.tripsync: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-for-development-only}
  expiration: 604800000

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

tourapi:
  key: ${TOURAPI_KEY:${TOUR_API_SERVICE_KEY:}}
  base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
  mobile-os: ${TOUR_API_MOBILE_OS:ETC}
  mobile-app: ${TOUR_API_MOBILE_APP:TripSync}
  response-type: ${TOUR_API_RESPONSE_TYPE:json}

api:
  base-url: ${API_BASE_URL:http://localhost:8080/api}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3001}

oauth:
  callback-base-url: ${OAUTH_CALLBACK_BASE_URL:http://localhost:8080}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  authorize-url: ${GOOGLE_AUTHORIZE_URL:https://accounts.google.com/o/oauth2/v2/auth}
  token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
  user-info-url: ${GOOGLE_USERINFO_URL:https://openidconnect.googleapis.com/v1/userinfo}

kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  authorize-url: ${KAKAO_AUTHORIZE_URL:https://kauth.kakao.com/oauth/authorize}
  token-url: ${KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}
  user-info-url: ${KAKAO_USERINFO_URL:https://kapi.kakao.com/v2/user/me}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:15:///tripsync?TC_REUSABLE=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
