spring:
  application:
    name: tmti-server

  profiles:
    active: local

  datasource:
    url: jdbc:postgresql://localhost:5432/tripsync
    username: ${DB_USER:tripsync}
    password: ${DB_PASSWORD:tripsync}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.tripsync: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-for-development-only}
  expiration: 604800000

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:10}

tourapi:
  key: ${TOURAPI_KEY:${TOUR_API_SERVICE_KEY:}}
  base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
  mobile-os: ${TOUR_API_MOBILE_OS:ETC}
  mobile-app: ${TOUR_API_MOBILE_APP:TripSync}
  response-type: ${TOUR_API_RESPONSE_TYPE:json}
  sync:
    enabled: ${TOUR_API_SYNC_ENABLED:true}
    cron: ${TOUR_API_SYNC_CRON:0 0 3 * * *}
    area-code: ${TOUR_API_SYNC_AREA_CODE:34}
    content-type-ids: ${TOUR_API_SYNC_CONTENT_TYPE_IDS:12,14,15,28,32,38,39}
    num-of-rows: ${TOUR_API_SYNC_NUM_OF_ROWS:100}
    max-pages: ${TOUR_API_SYNC_MAX_PAGES:1}
    retry-max-attempts: ${TOUR_API_SYNC_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-millis: ${TOUR_API_SYNC_RETRY_BACKOFF_MILLIS:500}
    request-interval-millis: ${TOUR_API_SYNC_REQUEST_INTERVAL_MILLIS:0}
    enrich-limit: ${TOUR_API_ENRICH_LIMIT:50}

external-popularity:
  sync:
    enabled: ${EXTERNAL_POPULARITY_SYNC_ENABLED:true}
    cron: ${EXTERNAL_POPULARITY_SYNC_CRON:0 30 4 * * MON}
    batch-limit: ${EXTERNAL_POPULARITY_BATCH_LIMIT:500}
    request-interval-millis: ${EXTERNAL_POPULARITY_REQUEST_INTERVAL_MILLIS:0}
    expires-after-days: ${EXTERNAL_POPULARITY_EXPIRES_AFTER_DAYS:14}
  naver:
    client-id: ${NAVER_DATALAB_CLIENT_ID:}
    client-secret: ${NAVER_DATALAB_CLIENT_SECRET:}
    search-url: ${NAVER_DATALAB_SEARCH_URL:https://openapi.naver.com/v1/datalab/search}
    lookback-days: ${NAVER_DATALAB_LOOKBACK_DAYS:30}
  google:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    match-radius-meters: ${GOOGLE_PLACES_MATCH_RADIUS_METERS:500}
    min-name-similarity: ${GOOGLE_PLACES_MIN_NAME_SIMILARITY:0.45}
    photo-max-width: ${GOOGLE_PLACES_PHOTO_MAX_WIDTH:900}

api:
  base-url: ${API_BASE_URL:http://localhost:8080/api}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3001}

oauth:
  callback-base-url: ${OAUTH_CALLBACK_BASE_URL:http://localhost:8080}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  authorize-url: ${GOOGLE_AUTHORIZE_URL:https://accounts.google.com/o/oauth2/v2/auth}
  token-url: ${GOOGLE_TOKEN_URL:https://oauth2.googleapis.com/token}
  user-info-url: ${GOOGLE_USERINFO_URL:https://openidconnect.googleapis.com/v1/userinfo}

kakao:
  client-id: ${KAKAO_CLIENT_ID:}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  authorize-url: ${KAKAO_AUTHORIZE_URL:https://kauth.kakao.com/oauth/authorize}
  token-url: ${KAKAO_TOKEN_URL:https://kauth.kakao.com/oauth/token}
  user-info-url: ${KAKAO_USERINFO_URL:https://kapi.kakao.com/v2/user/me}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:15:///tripsync?TC_REUSABLE=true
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
