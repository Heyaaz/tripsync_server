# Spring Boot Local (Docker) Profile
# Docker Compose 내에서 사용

spring:
  datasource:
    url: jdbc:postgresql://db:5432/tripsync
    username: tripsync
    password: tripsync
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
          order_inserts: true
          order_updates: true
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.tripsync: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-256-bits-min}
  expiration: 604800000

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

tourapi:
  key: ${TOURAPI_KEY:${TOUR_API_SERVICE_KEY:}}
  base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
  mobile-os: ${TOUR_API_MOBILE_OS:ETC}
  mobile-app: ${TOUR_API_MOBILE_APP:TripSync}
  response-type: ${TOUR_API_RESPONSE_TYPE:json}
  sync:
    enabled: ${TOUR_API_SYNC_ENABLED:true}
    cron: ${TOUR_API_SYNC_CRON:0 0 3 * * *}
    area-code: ${TOUR_API_SYNC_AREA_CODE:34}
    content-type-ids: ${TOUR_API_SYNC_CONTENT_TYPE_IDS:12,14,15,28,32,38,39}
    num-of-rows: ${TOUR_API_SYNC_NUM_OF_ROWS:100}
    max-pages: ${TOUR_API_SYNC_MAX_PAGES:1}
    retry-max-attempts: ${TOUR_API_SYNC_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-millis: ${TOUR_API_SYNC_RETRY_BACKOFF_MILLIS:500}
    request-interval-millis: ${TOUR_API_SYNC_REQUEST_INTERVAL_MILLIS:0}
    enrich-limit: ${TOUR_API_ENRICH_LIMIT:50}

api:
  base-url: ${API_BASE_URL:http://localhost:8080/api}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3001}

oauth:
  callback-base-url: ${OAUTH_CALLBACK_BASE_URL:http://localhost:8080}
